name: "Ansible Deploy"

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  ansible:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: task2

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH Key
        run: |
          # Створюємо файл ключа саме в робочій директорії task2
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > id_rsa
          chmod 600 id_rsa

      - name: Install Ansible
        run: sudo apt-get update && sudo apt-get install -y ansible

      - name: Ansible Check Mode (Dry Run)
        run: |
          ansible-playbook -i inventory.ini setup.yml --check \
          -e "ansible_host=${{ secrets.VM_IP }}" \
          --private-key id_rsa \
          --ssh-common-args='-o StrictHostKeyChecking=no' \
          -vvv
        env:
          ANSIBLE_HOST_KEY_CHECKING: False

      - name: Ansible Playbook Apply
        if: success()
        run: |
          ansible-playbook -i inventory.ini setup.yml \
          -e "ansible_host=${{ secrets.VM_IP }}" \
          --private-key id_rsa \
          --ssh-common-args='-o StrictHostKeyChecking=no'
        env:
          ANSIBLE_HOST_KEY_CHECKING: False
